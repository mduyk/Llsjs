<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>DELTA SHOP FINAL</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background: #f0f2f5; margin: 0; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        .header { background: #ff0000; color: #fff; padding: 12px; text-align: center; font-weight: bold; font-size: 16px; letter-spacing: 1px; }
        .grid { padding: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .card { background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; cursor: pointer; border: 1px solid #eee; }
        .card img { width: 100%; height: 130px; object-fit: cover; border-bottom: 1px solid #eee; }
        .card h4 { margin: 10px 5px; font-size: 14px; color: #333; height: 35px; overflow: hidden; }
        .card button { width: 100%; border: none; background: #ff4400; color: #fff; padding: 10px; font-weight: bold; font-size: 13px; cursor: pointer; }
        
        /* Modal Show Acc */
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:100; overflow-y:auto; -webkit-overflow-scrolling: touch; }
        .modal-c { background:#fff; width:95%; margin: 15px auto; border-radius:12px; padding:15px; box-sizing:border-box; position: relative; }
        .modal-close { position: absolute; top: 10px; right: 10px; background: #ccc; border: none; padding: 5px 10px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        
        .acc-item { border-bottom: 2px solid #eee; margin-bottom: 25px; padding-bottom: 15px; }
        
        /* Slide Ảnh PRO - Chỉnh Zoom Ảnh Đẹp */
        .slider { display: flex; overflow-x: auto; gap: 10px; scroll-snap-type: x mandatory; margin-bottom: 10px; }
        .slider img { flex: 0 0 100%; width: 100%; height: 260px; object-fit: contain; background: #000; border-radius: 8px; scroll-snap-align: start; }
        
        .m-price { color: #ff0000; font-size: 26px; font-weight: bold; margin: 10px 0; text-align: center; }
        .m-info { color: #555; font-size: 14px; white-space: pre-wrap; background: #f9f9f9; padding: 12px; border-radius: 8px; line-height: 1.5; border: 1px solid #eee; }
        
        .btn-mua { background:#ff0000; color:#fff; border:none; width:100%; padding:18px; border-radius:10px; font-weight:bold; font-size:18px; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        .btn-mua:active { opacity: 0.8; transform: scale(0.98); }
        .done-box { background:#e7f3ff; border:1px dashed #007bff; padding:18px; border-radius:10px; display:none; margin-top:10px; text-align:center; }
    </style>
</head>
<body>

<div class="header">NICKVN.NET - UY TÍN SỐ 1 VN</div>

<div id="cat-list" class="grid"></div>

<div id="modal" class="modal">
    <div class="modal-c">
        <button class="modal-close" onclick="document.getElementById('modal').style.display='none'">ĐÓNG X</button>
        <h3 id="m-title" style="margin-top:0; color:#333; text-transform: uppercase;"></h3>
        <hr style="border:0; border-top: 1px solid #eee; margin-bottom:15px;">
        <div id="m-list"></div>
    </div>
</div>

<script>
    const config = { apiKey: "AIzaSyBk6R1TDZeAxh37JQLgL_6Wl0v8m8Sg0", databaseURL: "https://shopctv-61f96-default-rtdb.asia-southeast1.firebasedatabase.app/" };
    firebase.initializeApp(config); const db = firebase.database();
    
    // Sếp liên kết biến User & Tiền từ code đăng nhập cũ vào đây
    let curUser = "test_user_v10"; 
    let userBalance = 50000000; // Giả sử user có 50tr

    // 1. Load Danh Mục ra Trang Chủ
    db.ref('categories').on('value', s => {
        const d = document.getElementById('cat-list'); d.innerHTML = "";
        s.forEach(c => {
            const data = c.val();
            d.innerHTML += `
                <div class="card" onclick="openM('${c.key}','${data.name}')">
                    <img src="${data.img}">
                    <h4>${data.name}</h4>
                    <button>MUA NGAY</button>
                </div>`;
        });
    });

    // 2. Mở danh mục -> Hiện danh sách Acc với Slide ALL Ảnh
    function openM(id, name) {
        document.getElementById('modal').style.display = 'block';
        document.getElementById('m-title').innerText = name;
        db.ref('products/'+id).on('value', s => {
            const list = document.getElementById('m-list'); list.innerHTML = "";
            s.forEach(a => {
                const data = a.val();
                if(data.status !== 'Còn hàng') return;

                // Gom tất cả ảnh (đại diện + mô tả) vào slide
                let allImgsHtml = "";
                // 1. Thêm ảnh đại diện vào đầu
                allImgsHtml += `<img src="${data.thumb}">`;
                // 2. Thêm các ảnh mô tả vào sau
                data.imgs.forEach(i => allImgsHtml += `<img src="${i}">`);

                list.innerHTML += `
                    <div class="acc-item" id="acc-${a.key}">
                        <div class="slider">${allImgsHtml}</div>
                        <p style="text-align:center; font-size:11px; color:#888; margin-top:5px;">(Vuốt sang để xem full ${1 + data.imgs.length} ảnh acc)</p>
                        
                        <div class="m-price">${Number(data.price).toLocaleString()}đ</div>
                        <div class="m-info">${data.info}</div>
                        
                        <button class="btn-mua" id="btn-${a.key}" onclick="buy('${id}','${a.key}',${data.price})">MUA TÀI KHOẢN</button>
                        
                        <div class="done-box" id="done-${a.key}">
                            <p style="color:#007bff; font-weight:bold; margin-top:0;">✅ MUA THÀNH CÔNG!</p>
                            <p style="font-size:13px; color:#555; margin-bottom:15px;">Chụp màn hình đơn hàng và liên hệ Admin Zalo:</p>
                            <a href="https://zalo.me/0328033706" target="_blank">
                                <button style="background:#0068ff; color:#fff; border:none; padding:12px; width:100%; border-radius:8px; cursor:pointer; font-weight:bold;">NHẮN ZALO: 0328033706</button>
                            </a>
                        </div>
                    </div>`;
            });
        });
    }

    // 3. Logic Mua & Hiện Zalo
    function buy(cid, aid, p) {
        if(userBalance < p) return alert("Hết tiền nạp thêm đi sếp ơi!");
        if(confirm("Xác nhận mua tài khoản giá " + Number(p).toLocaleString() + "đ?")) {
            // Sếp tự thêm code trừ tiền ở đây...
            db.ref(`products/${cid}/${aid}/status`).set('Đã bán'); // Đổi status trên Firebase
            document.getElementById('btn-'+aid).style.display = 'none'; // Ẩn nút mua
            document.getElementById('done-'+aid).style.display = 'block'; // Hiện Zalo
            alert("Mua thành công! Sếp check Zalo bên dưới nhé.");
        }
    }
</script>
</body>
</html>
